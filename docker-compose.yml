services:
  asr:
    build: .
    container_name: asr-service
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: asr-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - asr
    restart: unless-stopped
